    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thanks for everything</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body{
            background: #e9f4ee;
            text-align: center;
            margin: 0;
            padding: 24px 16px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: clamp(1rem, 2vw, 1.2rem);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        section{
            margin: 20px 0 0;
            text-align: center;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        button{
           background-color: #223e5b;
           width: min(100%, 260px);
           min-height: 48px;
           padding: 12px 16px;
           font-size: clamp(1rem, 2vw, 1.15rem);
           border: none;
           border-radius: 999px;
           display: flex;
           justify-content: center;
           align-items: center;
           margin: 0;
           box-shadow: 0 4px 10px rgba(0,0,0,0.15);
           transition: transform 0.2s ease, background-color 0.2s ease;
        }

        button:hover{
            background-color: whitesmoke;
            transform: translateY(-2px);
        }

        a{
            color: cornsilk;
            text-decoration: none;
            display: block;
            width: 100%;
            font-weight: 600;
        }

        a:hover{
            color: black;
        }

        img{
            width: min(220px, 70vw);
            max-width: 250px;
            border: solid;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        p {
            margin: 8px 0 0;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 12px;
            }

            section {
                max-width: 100%;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

    </section>
